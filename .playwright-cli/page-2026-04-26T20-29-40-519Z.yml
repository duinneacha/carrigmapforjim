    - generic [ref=e20]:
      - paragraph [ref=e21]: Leamlara House was located midway between Carrigtwohill village and Watergrasshill, In the late 1950’s the estate was sold to the Land Commission who divided it up and sold the land to farmers, the owner of this estate was Standish Barry at one time an MP. The main entrance was off the Leamlara road, there was a handsome set of gates and pillars and across the road a gate lodge built of cut limestone
      - 'figure "Leamlara House Image: Carrigtwohill Historical Society" [ref=e22]':
        - img "Photograph of Leamlara House" [ref=e23]
        - generic [ref=e24]:
          - text: Leamlara House
          - generic [ref=e25]: "Image: Carrigtwohill Historical Society"
      - paragraph [ref=e26]: There were extensive lawns and gardens with a lake formed by the Leamlara river, at one time in the late 1800’s it was proposed to build a reservoir at this Lake to supply drinking water to the towns of Cobh and Midleton along with Carrigtwohill, however agreement could not be reached and the proposal was abandoned. An electricity generator was installed, powered by water from the lake which supplied DC current to the house. When the Estate was divided up the house was demolished
