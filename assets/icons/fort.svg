<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 42" width="36" height="42" aria-hidden="true">
  <defs>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" />
      <feOffset dx="0" dy="1" result="o" />
      <feComponentTransfer><feFuncA type="linear" slope="0.45" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Teardrop pin body -->
    <path d="M18 1.5 C8.6 1.5 2 8.6 2 17.2 c0 6.2 4.0 11.2 8.9 16.8 l6.1 6.9 c0.5 0.6 1.5 0.6 2 0 l6.1 -6.9 C30.0 28.4 34 23.4 34 17.2 C34 8.6 27.4 1.5 18 1.5 Z"
          fill="#7a3b2e" stroke="#3b1a13" stroke-width="1.2" />
    <!-- Fort / tower silhouette -->
    <g transform="translate(8, 9)">
      <!-- Battlements -->
      <path d="M0 4 h3 v-2 h2 v2 h3 v-2 h2 v2 h3 v-2 h2 v2 h3 v-2 h2 v2 h0 v8 h-20 z"
            fill="#f6f1e6" />
      <!-- Door -->
      <path d="M8 9 h4 v4 h-4 z" fill="#3b1a13" />
      <!-- Base -->
      <rect x="0" y="12" width="20" height="2" fill="#f6f1e6" />
    </g>
  </g>
</svg>
