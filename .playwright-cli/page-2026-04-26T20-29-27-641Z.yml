      - paragraph [ref=e21]: When coming from Midleton at the roundabout before joining the N25, take a left on the road to Ballyannan and Ballyvodock. The Ruin of Ballyannan House/Castle are on the right.
      - paragraph [ref=e22]: St John Brodrick’s first occupied the castle built in 1650, in 1786 it was already in ruins, in 1814 it was occupied by Roger Willians at the time of the Griffith Valuation’s it was valued at £9.10 occupied by Daniel Twomey held from Lord Midleton, to the left is a small tidal inlet, which once was a graveyard, just some years ago some bones were found , its also reported when ploughing an nearby field silver spoons were found, There is a cave running from the side of the Castle to Ahanesk
